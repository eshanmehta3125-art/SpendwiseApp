<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ExpenseManager - Onboarding</title>

                        "tertiary-fixed-dim": "#ffb68c",
                        "primary-fixed": "#d3e4ff",
                        "inverse-surface": "#2e3035",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell (Suppressed Navigation for Onboarding) -->
<header class="bg-white dark:bg-[#272727] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
<div class="text-xl font-black text-[#8CE4FF] tracking-tight">ExpenseManager</div>
<button class="text-[#272727] dark:text-gray-400 font-['Inter'] font-bold text-lg hover:opacity-80 transition-opacity active:scale-95 duration-150">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-20 pb-12 overflow-hidden">
<!-- Hero Section: 3D Vault & Coins Visualization -->
<div class="relative w-full max-w-lg aspect-square flex items-center justify-center mb-12">
<!-- Background Abstract Glow -->
<div class="absolute inset-0 bg-primary-container opacity-20 blur-[100px] rounded-full"></div>
<!-- Main Content Area with Bento-style card for the 3D visual -->
<div class="relative w-full h-full bg-surface-container-lowest rounded-xl shadow-2xl overflow-hidden border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="Modern 3D render of a futuristic chrome vault door opening with glowing neon blue accents and floating digital gold coins in soft focus." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjhdFf7RuvtqO9771PmUrvGzc8geFkNZZDdh0bxtc4_G7a4Wau6eNitfncukZQ6Bv9qe3Dlo0rD56mb5EbOCSyS450-fS2UBe_04qjeDBvzZrY3uWQ22oE3RhVKOzVln5_Y4eO5c6gLmbxeOs5uw9bf9CeOOTrgXPEz6n_9h4Z0H91qu8gN_wTg1fhdYIPd_A5LVeT7onsVH_QQoIeMewLQsJugstvIbRCSDowO2eTqt1JpOe6OLYFOrc64IecEFGKMgwKhVBClfY"/>
<!-- Floating Coin Overlay Elements (CSS simulated) -->
<div class="absolute top-1/4 right-1/4 bg-secondary-container/40 backdrop-blur-md p-4 rounded-full shadow-lg border border-white/20">
<span class="material-symbols-outlined text-surface-container-lowest text-4xl" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
</div>
<div class="absolute bottom-1/3 left-1/4 bg-primary-container/40 backdrop-blur-md p-3 rounded-full shadow-lg border border-white/20">
<span class="material-symbols-outlined text-surface-container-lowest text-3xl" style="font-variation-settings: 'FILL' 1;">currency_exchange</span>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="text-center max-w-md mb-12">
<h1 class="font-headline font-extrabold text-4xl md:text-5xl text-on-surface mb-6 tracking-tight leading-tight">
                Master Your Money
            </h1>
<p class="font-body text-on-surface-variant text-lg md:text-xl leading-relaxed">
                Experience financial freedom by tracking every penny with ease. Our secure vault technology keeps your data private and your future bright.
            </p>
</div>
<!-- Progress Indicators (1/5) -->
<div class="flex gap-3 mb-10">
<div class="h-3 w-10 bg-primary-container rounded-full"></div>
<div class="h-3 w-3 bg-surface-container-highest rounded-full"></div>
<div class="h-3 w-3 bg-surface-container-highest rounded-full"></div>
<div class="h-3 w-3 bg-surface-container-highest rounded-full"></div>
<div class="h-3 w-3 bg-surface-container-highest rounded-full"></div>
</div>
</main>
<!-- Bottom Navigation Area (Action Centric) -->
<footer class="w-full max-w-lg mx-auto px-8 pb-12">
<button class="group relative w-full bg-primary-container text-on-primary-container font-headline font-bold text-xl py-6 rounded-full shadow-xl hover:opacity-90 active:scale-95 transition-all duration-150 flex items-center justify-center gap-4 overflow-hidden">
<!-- Glassmorphism Reflection effect -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
<span>Next</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
<!-- Optional Secondary Login Text -->
<div class="mt-8 text-center">
<p class="font-body text-on-surface-variant">
                Already have an account? <span class="text-primary font-bold cursor-pointer hover:underline">Log In</span>
</p>
</div>
</footer>
</body></html>
